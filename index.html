<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タモやんアプリ一覧</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="タモやんApps">
<meta name="theme-color" content="#FFEFF6">

<style>
  :root{
    --ink:#6B4A3E;
    --muted:#C2A39A;
    --line:#FFE1EC;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 8% 12%, rgba(255,200,220,0.35) 0, transparent 45%),
      radial-gradient(circle at 92% 8%, rgba(201,168,224,0.25) 0, transparent 40%),
      linear-gradient(160deg, #FFF6F0 0%, #FFEFF6 100%);
    background-attachment:fixed;
    color:var(--ink);
    font-family:"M PLUS Rounded 1c",-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    padding:32px 16px 48px;
  }
  .wrap{
    max-width:460px;
    margin:0 auto;
  }
  .avatar-wrap{
    display:flex;
    justify-content:center;
    margin-bottom:14px;
  }
  .avatar{
    width:104px;
    height:104px;
    border-radius:50%;
    border:4px solid #fff;
    box-shadow:0 8px 20px rgba(255,143,171,0.35);
    object-fit:cover;
    background:#fff;
  }
  h1{
    font-family:"Kiwi Maru","M PLUS Rounded 1c",sans-serif;
    font-size:22px;
    font-weight:500;
    text-align:center;
    margin:0 0 6px;
    color:#E8628A;
  }
  .sub{
    color:var(--muted);
    font-size:13px;
    text-align:center;
    margin:0 0 28px;
  }
  .app-link{
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--card);
    border:1.5px solid var(--line);
    border-radius:20px;
    padding:16px;
    margin-bottom:14px;
    text-decoration:none;
    color:var(--ink);
    box-shadow:0 6px 18px rgba(255,143,171,0.14);
    transition:transform .12s ease;
  }
  .app-link:active{transform:scale(0.98);}
  .app-icon{
    width:48px;
    height:48px;
    min-width:48px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    background:linear-gradient(135deg,#FFE1EC,#FFE9D6);
  }
  .app-body{flex:1;}
  .app-name{
    font-size:15px;
    font-weight:800;
    margin-bottom:3px;
    color:#E8628A;
  }
  .app-desc{
    font-size:12px;
    color:var(--muted);
    line-height:1.4;
  }
  .app-arrow{
    color:#FFB6C9;
    font-size:18px;
  }
  .empty-note{
    color:var(--muted);
    font-size:12.5px;
    text-align:center;
    padding:18px 0 4px;
    line-height:1.7;
  }
  .footer{
    text-align:center;
    margin-top:32px;
    font-size:11px;
    color:var(--muted);
  }
</style>
</head>
